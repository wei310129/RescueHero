name: rescuehero
services:
  nginx:
    image: nginx:latest
    ports:
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
#    extra_hosts:
#      - "host.docker.internal:host-gateway"

  mongodb:
    image: 'mongo:latest'
    environment:
      - 'MONGO_INITDB_DATABASE=rescuehero'
      - 'MONGO_INITDB_ROOT_USERNAME=hero'
      - 'MONGO_INITDB_ROOT_PASSWORD=rescue'
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data/db

  postgres:
    image: postgres:16-alpine
    environment:
      - 'POSTGRES_DB=rescuehero'
      - 'POSTGRES_USER=hero'
      - 'POSTGRES_PASSWORD=rescue'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: 'redis:latest'
    command: ["redis-server", "--requirepass", "rescue"]
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data


volumes:
  mongodb-data:
  postgres-data:
  redis-data: