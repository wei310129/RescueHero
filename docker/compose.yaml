name: rescuehero
services:
  mongodb:
    image: 'mongo:latest'
    environment:
      - 'MONGO_INITDB_DATABASE=rescuehero'
      - 'MONGO_INITDB_ROOT_USERNAME=hero'
      - 'MONGO_INITDB_ROOT_PASSWORD=rescue'
    ports:
      - '27017:27017'
    volumes:
      - ./mongo/data:/data/db

  postgres:
    image: postgres:16-alpine
    environment:
      - 'POSTGRES_DB=rescuehero'
      - 'POSTGRES_USER=hero'
      - 'POSTGRES_PASSWORD=rescue'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: 'redis:latest'
    command: ["redis-server", "--requirepass", "rescue"]
    ports:
      - '6379:6379'
    volumes:
      - ./redis/data:/data

volumes:
  mongo-data:
  postgres-data:
  redis-data: